<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Barriecito&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Erica+One&family=Goldman:wght@400;700&family=Indie+Flower&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Special+Elite&display=swap" rel="stylesheet">
    <title>Tesla Project</title>
</head>

<body>
    <header class="main-header">
        <div class="container container-flex">
            <div class="logo">
                <figure>
                    <img src="assets/logo-white.svg" alt="Logo da Tesla">
                </figure>
            </div>
            <div class="main-nav">
                <nav>
                    <ul>
                        <li><a href="#">Vehicles</a></li>
                        <li><a href="#">Energy</a></li>
                        <li><a href="#">Charging</a></li>
                        <li><a href="#">Discover</a></li>
                        <li><a href="#">Shop</a></li>
                        <li><a href="#">We, Robot</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    <section class="hero">
        <div class="container container-flex">
            <div class="brand">
                <figure>
                    <img src="assets/logo-cybertruck.svg" alt="Logo do cybertruck">
                </figure>
            </div>
            <div class="text-hero">
                <h1>a new dimension of technology</h1>
                <p>Built for any adventure, Cybertruck has a durable exterior, spacious interior and advanced safety features.</p>
                <div class="hero-btns">
                    <button class="btn-primary">Order Now</button>
                    <button class="btn-secondary">Demo Drive</button>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
